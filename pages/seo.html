---
layout: default
title: SEO
permalink: /seo/
---

<!-- Blog Posts -->
<ul class="blog">
    {% for post in site.tags.SEO %}
    <li class="br umb-30">
        <!-- Image -->
        <div class="blog-image"><img src="{{ post.thumbnail }}" alt=""></div>
        <!-- Title -->
        <a href="{{ post.url }}"><h2>{{ post.title }}</h2></a>
        <!-- Descritpion -->
        <p>{{ post.description }}</p>
      </li>
    {% endfor %}
</ul>
